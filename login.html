<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BantuBencana</title>
    <link rel="icon" href="assets/profile.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<nav>
    <div class="logo">
        <img src="assets/profile.png" class="logo-img">
        <span>BantuBencana</span>
    </div>

    <div class="menu">
        <a href="index.html">Home</a>
        <a href="index.html#bencana">Data Bencana</a>
        <a href="index.html#contributor">Contributor</a>
        <a href="index.html#kontak">Kontak</a>
    </div>
</nav>

<div class="auth-container">

    <!-- FOTO -->
    <div class="auth-image">
        <img src="assets/dar.jpg" alt="Gunung Meletus">
    </div>

    <!-- FORM -->
    <div class="auth-card">
        <h2>Login ke <span>BantuBencana</span></h2>

        <form id="loginForm">
            <div class="form-group">
                <input type="email" required placeholder="Email">
            </div>

            <div class="form-group">
                <input type="password" required placeholder="Password">
            </div>

            <button type="submit" class="auth-btn">Login</button>
        </form>

        <p>Belum punya akun? <a href="register.html">Daftar</a></p>
    </div>

</div>

<footer>
    <p>&copy; 2026 BantuBencana</p>
</footer>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    window.location.href = 'admin.html';
});
</script>

</body>
</html>
