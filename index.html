<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Document</title>
      <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <nav>
      <div class="logo">BantuBencana</div>
      <div class="menu">
        <a href="#">Home</a>
        <a href="#">Data Bencana</a>
        <a href="#">Donasi</a>
        <a href="#">Kontak</a>
      </div>
    </nav>

    <section class="hero">
      <div class="hero-text">
        <h1>Peduli Bencana <br><span>Bantu Sesama</span></h1>
        <p>Dapatkan informasi bencana terbaru dan bantu korban dengan 
          donasi atau bantuan logistik secara cepat dan transparan.
        </p>
        <button class="hero-btn" onclick="scrollToBencana()">Lihat Data Bencana</button>
      </div>
      <div class="hero-img" id="heroSlider">
        <img src="https://images.unsplash.com/photo-1547683905-f686c993aae5" class="active" alt="Foto Bencana">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="Foto Bencana">
        <img src="https://images.unsplash.com/photo-1494526585095-c41746248156" alt="Foto Bencana">
      </div>
    </section>

    <main>
      <h2>Daftar Bencana</h2>
      <div id="bencanaList"></div>
    
      <div id="detailBencana" style="display:none;">
        <h3>Detail Bencana</h3>
        <p><strong>Tempat:</strong> <span id="tempat"></span></p>
        <p><strong>Jenis Bencana:</strong> <span id="jenis"></span></p>
        <p><strong>Tanggal:</strong> <span id="tanggal"></span></p>
        <p><strong>Deskripsi:</strong> <span id="deskripsi"></span></p>
        <br>
        <button class="donasi-btn" onclick="donasiBarang()">Donasi Barang</button>
        <button class="donasi-btn" onclick="donasiUang()">Donasi Uang</button>
      </div>
    </main>

    <section id="kontak" style="max-width:900px; margin:40px auto 60px; padding:20px; background:white; border:2px solid #212529; border-radius:12px; box-shadow:0 3px 12px rgba(0,0,0,0.15);">
      <h2>Kontak Kami</h2>
      <form id="contactForm" style="display:flex; flex-direction:column;">
        <label for="nama" style="margin:12px 0 6px;">Nama:</label>
        <input type="text" id="nama" required placeholder="Masukkan nama Anda" />

        <label for="email" style="margin:12px 0 6px;">Email:</label>
        <input type="email" id="email" required placeholder="Masukkan email Anda" />

        <label for="pesan" style="margin:12px 0 6px;">Pesan:</label>
        <textarea id="pesan" rows="4" required placeholder="Tulis pesan Anda"></textarea>

        <button type="submit">Kirim Pesan</button>
      </form>
    </section>

    <script src="script.js"></script>
  </body>
</html>
